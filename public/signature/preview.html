<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trey — Signature Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* Local Hurka fonts */
    @font-face {
      font-family: 'Skrappa Wide';
      src: url('./fonts/WTSkrappaTRIAL-Wide.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'Skrappa Generous';
      src: url('./fonts/WTSkrappaTRIAL-Generous.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'Skrappa Reasonable';
      src: url('./fonts/WTSkrappaTRIAL-Reasonable.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'Skrappa Reasonable Italic';
      src: url('./fonts/WTSkrappaTRIAL-ReasonableIta.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'Skrappa Reasonable Italic Tight';
      src: url('./fonts/WTSkrappaTRIAL-ReasonableItTi.otf') format('opentype');
      font-display: swap;
    }

    :root {
      --pink:  #FF2E7E;
      --lime:  #B8E62F;
      --cyan:  #00C8E0;
      --orange:#FF6B1A;
      --red:   #E84A2E;
      --gold:  #FFD23F;
      --white: #ffffff;
      --black: #000000;
      --frame: #2A2A2A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 20px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .preview-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }

    /* ──────────────────────────────────────────
       SIGNATURE CARD
       ──────────────────────────────────────── */
    .sig-card {
      position: relative;
      width: 600px;
      height: 220px;
      background: var(--white);
      overflow: hidden;
    }

    .wordmark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Skrappa Reasonable Italic', sans-serif;
      line-height: 1;
      color: var(--black);
      z-index: 10;
      white-space: nowrap;
      letter-spacing: -2px;
      user-select: none;
      opacity: 0;
    }
    /* Three names cycle: Angel → Trey → Carrillo. Trey holds longest. */
    .wordmark.angel    { font-size: 156px; animation: word-angel    8s ease-in-out infinite; }
    .wordmark.trey     { font-size: 184px; animation: word-trey     8s ease-in-out infinite; }
    .wordmark.carrillo { font-size: 120px; animation: word-carrillo 8s ease-in-out infinite; }

    @keyframes word-angel {
      0%   { opacity: 1; }
      25%  { opacity: 1; }
      30%  { opacity: 0; }
      95%  { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes word-trey {
      0%, 25%   { opacity: 0; }
      30%, 70%  { opacity: 1; }
      75%, 100% { opacity: 0; }
    }
    @keyframes word-carrillo {
      0%, 70%   { opacity: 0; }
      75%, 95%  { opacity: 1; }
      100%      { opacity: 0; }
    }

    /* Stars sit BEHIND wordmark */
    .star {
      position: absolute;
      z-index: 1;
      transform-origin: center;
      will-change: transform, opacity;
    }
    .star svg { display: block; width: 100%; height: 100%; }

    /* ──────────────────────────────────────────
       TWO BIG CORNER STARS (anchors)
       Larger, slower (8s), out of phase so they
       never peak at the same time.
       Pop from the corners OF Trey outward.
       ──────────────────────────────────────── */
    .big-tl {
      top: -18px; left: -18px;
      width: 124px; height: 124px;
      animation: pop-big-tl 8s ease-in-out infinite;
    }
    .big-br {
      bottom: -18px; right: -18px;
      width: 124px; height: 124px;
      animation: pop-big-br 8s ease-in-out infinite;
      animation-delay: -4s; /* offset by half-loop */
    }

    /* Pink corner star: small drift, strong "breath" pulse (two breaths per 8s loop). */
    @keyframes pop-big-tl {
      0%, 100% { transform: translate(50px, 20px) scale(0.55) rotate(0deg);   opacity: 0.75; }
      20%      { transform: translate(28px, 10px) scale(1.20) rotate(70deg);  opacity: 1; }
      40%      { transform: translate(40px, 16px) scale(0.65) rotate(140deg); opacity: 0.85; }
      60%      { transform: translate(22px, 8px)  scale(1.30) rotate(210deg); opacity: 1; }
      80%      { transform: translate(45px, 18px) scale(0.70) rotate(280deg); opacity: 0.95; }
    }
    /* Cyan corner star: mirrored. */
    @keyframes pop-big-br {
      0%, 100% { transform: translate(-50px, -20px) scale(0.55) rotate(0deg);    opacity: 0.75; }
      20%      { transform: translate(-28px, -10px) scale(1.20) rotate(-70deg);  opacity: 1; }
      40%      { transform: translate(-40px, -16px) scale(0.65) rotate(-140deg); opacity: 0.85; }
      60%      { transform: translate(-22px, -8px)  scale(1.30) rotate(-210deg); opacity: 1; }
      80%      { transform: translate(-45px, -18px) scale(0.70) rotate(-280deg); opacity: 0.95; }
    }

    /* ──────────────────────────────────────────
       SMALLER FILLER STARS (faster pops, no outline)
       ──────────────────────────────────────── */
    .s1 { top: 18px;   left: 220px;  width: 38px; height: 38px; animation: pop-a 3.4s ease-in-out infinite; animation-delay: -1.2s; }
    .s2 { top: 28px;   right: 130px; width: 32px; height: 32px; animation: pop-b 3.0s ease-in-out infinite; animation-delay: -0.6s; }
    .s3 { bottom: 22px;left: 220px;  width: 36px; height: 36px; animation: pop-c 3.6s ease-in-out infinite; animation-delay: -2.0s; }
    .s4 { bottom: 30px;right: 150px; width: 30px; height: 30px; animation: pop-d 3.2s ease-in-out infinite; animation-delay: -1.6s; }
    .s5 { top: 50%;    left: 8px;    width: 26px; height: 26px; animation: pop-e 2.8s ease-in-out infinite; animation-delay: -0.8s; }
    .s6 { top: 50%;    right: 8px;   width: 30px; height: 30px; animation: pop-f 3.2s ease-in-out infinite; animation-delay: -2.2s; }

    @keyframes pop-a {
      0%, 100% { transform: translate(50px, 70px)   scale(0) rotate(0deg);   opacity: 0; }
      18%      { transform: translate(25px, 35px)   scale(0.7) rotate(120deg); opacity: 1; }
      50%      { transform: translate(0, 0)         scale(1) rotate(220deg);  opacity: 1; }
      82%      { transform: translate(25px, 35px)   scale(0.7) rotate(320deg); opacity: 0.7; }
    }
    @keyframes pop-b {
      0%, 100% { transform: translate(-40px, 65px)  scale(0) rotate(0deg);    opacity: 0; }
      18%      { transform: translate(-20px, 32px)  scale(0.7) rotate(-100deg);opacity: 1; }
      50%      { transform: translate(0, 0)         scale(1) rotate(-200deg); opacity: 1; }
      82%      { transform: translate(-20px, 32px)  scale(0.7) rotate(-300deg);opacity: 0.7; }
    }
    @keyframes pop-c {
      0%, 100% { transform: translate(40px, -65px)  scale(0) rotate(0deg);   opacity: 0; }
      18%      { transform: translate(20px, -32px)  scale(0.7) rotate(140deg);opacity: 1; }
      50%      { transform: translate(0, 0)         scale(1) rotate(240deg); opacity: 1; }
      82%      { transform: translate(20px, -32px)  scale(0.7) rotate(340deg);opacity: 0.7; }
    }
    @keyframes pop-d {
      0%, 100% { transform: translate(-50px, -60px) scale(0) rotate(0deg);   opacity: 0; }
      18%      { transform: translate(-25px, -30px) scale(0.7) rotate(-120deg);opacity: 1; }
      50%      { transform: translate(0, 0)         scale(1) rotate(-220deg);opacity: 1; }
      82%      { transform: translate(-25px, -30px) scale(0.7) rotate(-320deg);opacity: 0.7; }
    }
    @keyframes pop-e {
      0%, 100% { transform: translate(140px, 0)     scale(0) rotate(0deg);    opacity: 0; }
      18%      { transform: translate(70px, 0)      scale(0.7) rotate(180deg); opacity: 1; }
      50%      { transform: translate(0, 0)         scale(1) rotate(300deg);  opacity: 1; }
      82%      { transform: translate(70px, 0)      scale(0.7) rotate(420deg); opacity: 0.7; }
    }
    @keyframes pop-f {
      0%, 100% { transform: translate(-140px, 0)    scale(0) rotate(0deg);    opacity: 0; }
      18%      { transform: translate(-70px, 0)     scale(0.7) rotate(-180deg);opacity: 1; }
      50%      { transform: translate(0, 0)         scale(1) rotate(-300deg); opacity: 1; }
      82%      { transform: translate(-70px, 0)     scale(0.7) rotate(-420deg);opacity: 0.7; }
    }

    /* ──────────────────────────────────────────
       FULL SIGNATURE BLOCK
       ──────────────────────────────────────── */
    .sig-block {
      width: 600px;
      font-family: 'Inter', sans-serif;
      color: var(--black);
      background: var(--white);
      padding: 0;
    }
    .sig-block .gif-slot { width: 600px; height: 220px; }
    .sig-block .info { padding: 12px 0 0 0; display: flex; flex-direction: column; gap: 2px; font-size: 13px; line-height: 1.5; }
    .sig-block .name { font-weight: 700; font-size: 14px; letter-spacing: 0.2px; }
    .sig-block .role { color: #555; font-size: 13px; }
    .sig-block .links { margin-top: 4px; font-size: 13px; }
    .sig-block .links a { color: var(--black); text-decoration: none; }
    .sig-block .links a.linked { border-bottom: 1px solid var(--black); }
    .sig-block .sep { color: #aaa; padding: 0 6px; }

  </style>
</head>
<body>
